<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador CDB vs LCI/LCA</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#020617;
  color:#fff;
}

.header{
  position:sticky;
  top:0;
  background:#020617;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  color:#000;
  padding:15px 20px;
  border-radius:16px;
  margin-bottom:20px;
}

input, select{
  width:96%;
  padding:8px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ccc;
  font-weight:bold;
  color:blue;
  font-size:15px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.resultado{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  margin-top:15px;
  }

.resumo{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:5px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header" style="font-weight:bold">
  <div>InvestPro</div>
  <a href="index.html" style="color:yellow;">← Voltar</a></div>

<div class="container">

<h2 style="margin-top: 5px; margin-bottom:15px; text-align: center; font-size:20px;">🏦 Comparador CDB vs LCI / LCA</h2>

<div class="card">

<label>Valor investido (R$)</label>
<input type="number" id="valor" value="1000">

<label>CDI atual (% ao ano)</label>
<input type="number" id="cdi" value="14.65">

<label><b>CDB</b> (% CDI)</label>
<input type="number" id="cdb" value="110">

<label><b>LCI/LCA</b> (% CDI)</label>
<input type="number" id="lci" value="91">

<label>Prazo</label>
<input type="number" id="prazo" value="12">

<select id="tipoPrazo">
<option value="meses">Meses</option>
<option value="dias">Dias</option>
</select>

<button onclick="calcular()">Comparar</button>

</div>
<div class="resultado" id="resultado"></div>
<canvas id="grafico" style="background:white; border-radius:10px; padding:5px; margin-top:15px"></canvas>



</div>

<script>
let chart;

function calcular(){

let valor = parseFloat(document.getElementById("valor").value) || 0;
let cdi = parseFloat(document.getElementById("cdi").value)/100;
let cdbPct = parseFloat(document.getElementById("cdb").value)/100;
let lciPct = parseFloat(document.getElementById("lci").value)/100;
let prazo = parseInt(document.getElementById("prazo").value);
let tipo = document.getElementById("tipoPrazo").value;

/* converter prazo */
let dias = tipo === "meses" ? prazo * 30 : prazo;

/* CDI diário (base 360) */
let taxaDiaCDI = Math.pow(1 + cdi, 1/360) - 1;

/* taxas efetivas */
let taxaCDB = taxaDiaCDI * cdbPct;
let taxaLCI = taxaDiaCDI * lciPct;

/* montantes */
let montanteCDB = valor * Math.pow(1 + taxaCDB, dias);
let montanteLCI = valor * Math.pow(1 + taxaLCI, dias);

/* lucro */
let lucroCDB = montanteCDB - valor;

/* IR regressivo real (até 180 22.5%, até 360 20%, até 720 17,5%, =>721 15%) */
let ir = 0;
if(dias <= 179) ir = 0.225;
else if(dias <= 359) ir = 0.20;
else if(dias <= 719) ir = 0.175;
else ir = 0.15;

/* líquido */
let imposto = lucroCDB * ir;
let liquidoCDB = montanteCDB - imposto;
let liquidoLCI = montanteLCI;

/* vencedor */
let vencedor = liquidoLCI > liquidoCDB ? "LCI/LCA" : "CDB";

/* gráfico */
if(chart) chart.destroy();

chart = new Chart(document.getElementById("grafico"), {
type:'bar',
data:{
labels:["CDB","LCI/LCA"],
datasets:[{
label:"Valor Líquido Final",
data:[liquidoCDB, liquidoLCI]
}]
},
options:{
plugins:{legend:{display:false}},
responsive:true
}
});

/* resultado */
document.getElementById("resultado").innerHTML = `
<div class="resumo">
<div>CDB Líquido:<br><b>R$ ${liquidoCDB.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div>Imposto:<br><b>R$ ${imposto.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div>LCI/LCA Líquido:<br><b>R$ ${liquidoLCI.toLocaleString("pt-BR",{minimumFractionDigits:2})}</b></div>
<div>🏆 Melhor:<br><b>${vencedor}</b></div>
</div>
`;

}</script>

</body>
</html>
